<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nuestro Universo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  :root{
    --space:#040108;--rose:#ff4d6d;--glow:#ffb3c1;--star:#f7eef1;--ink:#efe6e9;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:var(--space);font-family:'Inter',sans-serif;color:var(--ink)}
  #scene{position:fixed;inset:0;z-index:1;touch-action:none}

  /* ---------- INTRO ---------- */
  #intro{
    position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:34px;
    background:radial-gradient(ellipse at 50% 120%, rgba(122,16,41,.35), transparent 60%), var(--space);
    transition:opacity 1.4s ease, visibility 1.4s;
  }
  #intro h1{
    font-family:'Cormorant Garamond',serif;font-weight:400;
    font-size:clamp(2rem,8vw,4.2rem);letter-spacing:.42em;text-indent:.42em;
    color:var(--star);text-align:center;text-shadow:0 0 40px rgba(255,77,109,.35);
    animation:breathe 5s ease-in-out infinite;
  }
  @keyframes breathe{0%,100%{opacity:.85}50%{opacity:1}}
  #intro p.sub{
    font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.02rem;
    color:rgba(239,230,233,.55);margin-top:-18px;text-align:center;padding:0 30px;
  }
  #intro button{
    background:none;border:none;color:var(--glow);cursor:pointer;
    font-weight:300;font-size:.78rem;letter-spacing:.55em;text-indent:.55em;
    padding:14px 10px 10px;border-bottom:1px solid rgba(255,179,193,.35);transition:all .4s;
  }
  #intro button:hover{color:#fff;border-color:#fff;letter-spacing:.7em;text-indent:.7em}
  #intro.hidden{opacity:0;visibility:hidden}

  /* ---------- MODAL ---------- */
  #veil{
    position:fixed;inset:0;background:rgba(2,0,6,.82);backdrop-filter:blur(7px);
    z-index:80;display:flex;align-items:center;justify-content:center;padding:22px;
    opacity:0;visibility:hidden;transition:.5s;
  }
  #veil.open{opacity:1;visibility:visible}
  #card{
    width:min(430px,94vw);max-height:86vh;overflow-y:auto;
    background:linear-gradient(165deg, rgba(26,6,14,.96), rgba(8,2,10,.98));
    border:1px solid rgba(255,77,109,.22);border-radius:16px;
    padding:34px 30px 28px;text-align:center;
    box-shadow:0 0 80px rgba(255,77,109,.16), 0 30px 60px rgba(0,0,0,.6);
    transform:translateY(16px) scale(.97);transition:.5s cubic-bezier(.2,.8,.3,1);
    scrollbar-width:thin;
  }
  #veil.open #card{transform:none}
  #card .emoji{font-size:2rem;margin-bottom:14px;display:block}
  #card img{
    width:100%;max-height:270px;object-fit:cover;border-radius:10px;
    margin-bottom:20px;border:1px solid rgba(255,179,193,.18);
    box-shadow:0 12px 30px rgba(0,0,0,.5);
  }
  #card h2{
    font-weight:400;font-size:.72rem;letter-spacing:.42em;text-indent:.42em;
    color:var(--glow);text-transform:uppercase;margin-bottom:18px;
  }
  #card .msg{
    font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;
    font-size:1.28rem;line-height:1.55;color:var(--star);
    margin-bottom:8px;white-space:pre-line;
  }
  #card .date{
    font-weight:300;font-size:.62rem;letter-spacing:.3em;text-indent:.3em;
    color:rgba(239,230,233,.4);margin-top:16px;text-transform:uppercase;
  }
  #card button{
    margin-top:24px;background:none;border:1px solid rgba(255,179,193,.3);
    color:var(--glow);font-weight:300;font-size:.66rem;letter-spacing:.4em;text-indent:.4em;
    padding:11px 26px 10px;border-radius:30px;cursor:pointer;transition:.35s;
  }
  #card button:hover{border-color:#fff;color:#fff}

  #hint{
    position:fixed;bottom:22px;left:0;right:0;text-align:center;z-index:3;
    font-family:'Cormorant Garamond',serif;font-style:italic;
    font-size:.95rem;color:rgba(239,230,233,.5);
    opacity:0;transition:opacity 1.2s;pointer-events:none;padding:0 20px;
  }
  #hint.show{opacity:1}
</style>
</head>
<body>

<canvas id="scene"></canvas>

<div id="intro">
  <h1>NUESTRO UNIVERSO</h1>
 
  <button id="explore">EXPLORAR</button>
</div>

<div id="hint">Gira el universo con el dedo · pellizca para acercarte · toca un planeta y descubre nuestros recuerdos 💫</div>

<div id="veil" role="dialog" aria-modal="true">
  <div id="card">
    <span class="emoji" id="c-emoji"></span>
    <img id="c-img" alt="" style="display:none">
    <h2 id="c-title"></h2>
    <div class="msg" id="c-msg"></div>
    <div class="date" id="c-date"></div>
    <button id="c-close">CERRAR</button>
  </div>
</div>

<script>
/* ============================================================
   PLANETAS — edita aquí 💗  (img: URL de foto o "")
   ============================================================ */
const PLANETS = [

    msg:"17 de febrero. Me lo dijiste tú primero, a la 1:04, riéndote.\nYo te lo devolví a la 1:15.\nEse mismo día nació el “shi” y escribiste “oww me enamoré”.\nEl mejor día que ni sabíamos que estábamos viviendo.",

    color:0x9d7bff, size:4.4, pos:[54, 4, 8] },

  { title:"Princesa", emoji:"",
    msg:"“TÚ ME ODIAS”, me gritabas jugando.\nY en medio de eso te dije “te quiero muchooo princesa”.\nDejaste de escribir. Te estabas derritiendo en silencio.",
    date:"23 · Febrero · 2026 · 10:43 pm", img:"",
    color:0xffd9a0, size:3.4, pos:[-58, -14, 6] },

  { title:"El Primer Te Amo", emoji:"🥹",
    msg:"“Te amo.”\n“Oww ¿qué acabaste de decir? Voy a llorar.”\n“Que te amo.”\n“Me hiciste llorar. Yo también te amo.”\n“Tú no eres cualquiera, Juli eres la niña que quiero por siempre.”\n\nYa van más de 2.500 desde ese día.",

  { title:"2.591 Veces", emoji:"🔢",
    msg:"Nos hemos dicho “te amo” dos mil quinientas noventa y una veces.\nDe novios, 26 veces al día en promedio.\nNi una sola fue por costumbre.",
    date:"Enero → Hoy", img:"",
    color:0xff4d6d, size:3.8, pos:[0, -6, 46] },

/* ============================================================ */
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:false});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x040108, 0.0032);
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, .1, 1200);

/* --- cámara orbital propia (drag + zoom + inercia) --- */
let theta = .6, phi = 1.15, radius = 120;
let vTheta = 0, vPhi = 0;
const target = new THREE.Vector3(0,0,0);
function updateCam(){
  phi = Math.max(.25, Math.min(Math.PI-.25, phi));
  radius = Math.max(28, Math.min(300, radius));
  camera.position.set(
    target.x + radius*Math.sin(phi)*Math.sin(theta),
    target.y + radius*Math.cos(phi),
    target.z + radius*Math.sin(phi)*Math.cos(theta)
  );
  camera.lookAt(target);
}
function resize(){
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
}
addEventListener('resize', resize); resize(); updateCam();

/* --- luces --- */
scene.add(new THREE.AmbientLight(0x2a1020, 2.2));
const key = new THREE.PointLight(0xff4d6d, 1.6, 600); key.position.set(60,80,40); scene.add(key);
const fill = new THREE.PointLight(0x7cc2ff, .7, 600); fill.position.set(-80,-40,-60); scene.add(fill);

/* --- texturas suaves generadas --- */
function glowTexture(hex, inner=1){
  const c = document.createElement('canvas'); c.width=c.height=128;
  const x = c.getContext('2d');
  const col = '#'+hex.toString(16).padStart(6,'0');
  const g = x.createRadialGradient(64,64,0,64,64,64);
  g.addColorStop(0, col);
  g.addColorStop(.25*inner, col+'cc');
  g.addColorStop(1, 'transparent');
  x.fillStyle=g; x.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(c);
}
function labelTexture(text){
  const c = document.createElement('canvas');
  const x = c.getContext('2d');
  const f = '300 34px Inter, sans-serif';
  x.font = f;
  const w = Math.ceil(x.measureText(text.toUpperCase()).width) + 60;
  c.width = w; c.height = 64;
  const x2 = c.getContext('2d');
  x2.font = f;
  x2.letterSpacing = '8px';
  x2.fillStyle = 'rgba(247,238,241,.85)';
  x2.textAlign='center'; x2.textBaseline='middle';
  x2.shadowColor='rgba(0,0,0,.9)'; x2.shadowBlur=8;
  x2.fillText(text.toUpperCase(), w/2, 34);
  const t = new THREE.CanvasTexture(c);
  t.userData = {w, h:64};
  return t;
}

/* --- estrellas 3D --- */
function starField(count, spread, size, color, opacity){
  const geo = new THREE.BufferGeometry();
  const pts = new Float32Array(count*3);
  for(let i=0;i<count*3;i++) pts[i] = (Math.random()-.5)*spread;
  geo.setAttribute('position', new THREE.BufferAttribute(pts,3));
  const mat = new THREE.PointsMaterial({
    color, size, map:glowTexture(0xffffff), transparent:true,
    opacity, depthWrite:false, blending:THREE.AdditiveBlending, sizeAttenuation:true
  });
  const p = new THREE.Points(geo, mat);
  scene.add(p);
  return p;
}
const stars1 = starField(2600, 700, 1.6, 0xf7eef1, .9);
const stars2 = starField(1200, 500, 2.6, 0xffb3c1, .5);
const stars3 = starField(700, 900, 3.4, 0x7cc2ff, .35);

/* --- nebulosas (sprites gigantes suaves) --- */
[[0xff2e55,[-120,40,-160],420],[0x7a1029,[140,-60,-220],520],
 [0x9d7bff,[60,120,-260],380],[0xff6b8f,[-40,-120,-180],360]].forEach(([col,pos,s])=>{
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({
    map:glowTexture(col,.5), transparent:true, opacity:.16,
    depthWrite:false, blending:THREE.AdditiveBlending
  }));
  sp.position.set(...pos); sp.scale.set(s,s,1);
  scene.add(sp);
});

/* --- planetas --- */
const clickable = [];
const planetGroup = new THREE.Group(); scene.add(planetGroup);

PLANETS.forEach((p,i)=>{
  const g = new THREE.Group();
  g.position.set(...p.pos);

  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(p.size, 40, 40),
    new THREE.MeshStandardMaterial({
      color:p.color, roughness:.35, metalness:.15,
      emissive:p.color, emissiveIntensity:.45
    })
  );
  mesh.userData.planet = p;
  g.add(mesh);
  clickable.push(mesh);

  /* halo */
  const halo = new THREE.Sprite(new THREE.SpriteMaterial({
    map:glowTexture(p.color), transparent:true, opacity:.55,
    depthWrite:false, blending:THREE.AdditiveBlending
  }));
  halo.scale.set(p.size*5.2, p.size*5.2, 1);
  g.add(halo);

  /* anillo dorado para El Sí */
  if(p.special){
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(p.size*1.5, p.size*2.1, 64),
      new THREE.MeshBasicMaterial({color:0xffd166, side:THREE.DoubleSide, transparent:true, opacity:.65})
    );
    ring.rotation.x = Math.PI/2.4;
    g.add(ring);
    g.userData.ring = ring;
  }

  /* etiqueta */
  const lt = labelTexture(p.title);
  const label = new THREE.Sprite(new THREE.SpriteMaterial({map:lt, transparent:true, depthWrite:false}));
  const lw = lt.userData.w/22;
  label.scale.set(lw, 64/22, 1);
  label.position.y = -(p.size + 4);
  g.add(label);

  g.userData.base = p.pos[1];
  g.userData.speed = .4 + Math.random()*.6;
  g.userData.phase = Math.random()*Math.PI*2;
  g.userData.mesh = mesh;
  planetGroup.add(g);
});

/* --- corazones flotantes pequeñitos --- */
const heartTex = (()=>{const c=document.createElement('canvas');c.width=c.height=64;
  const x=c.getContext('2d');x.font='48px serif';x.textAlign='center';x.textBaseline='middle';
  x.fillText('❤',32,36);return new THREE.CanvasTexture(c);})();
const hearts=[];
for(let i=0;i<24;i++){
  const h=new THREE.Sprite(new THREE.SpriteMaterial({map:heartTex,transparent:true,opacity:.35,depthWrite:false}));
  h.position.set((Math.random()-.5)*220,(Math.random()-.5)*160,(Math.random()-.5)*220);
  const s=2+Math.random()*2.5; h.scale.set(s,s,1);
  h.userData={v:.02+Math.random()*.04};
  scene.add(h); hearts.push(h);
}

/* --- interacción: drag / pinch / click --- */
let dragging=false, moved=false, px=0, py=0, pinchD=0;
canvas.addEventListener('pointerdown',e=>{
  dragging=true;moved=false;px=e.clientX;py=e.clientY;
  vTheta=vPhi=0;
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove',e=>{
  if(!dragging)return;
  const dx=e.clientX-px, dy=e.clientY-py;
  if(Math.abs(dx)+Math.abs(dy)>4)moved=true;
  theta -= dx*.005; phi -= dy*.005;
  vTheta=-dx*.005; vPhi=-dy*.005;
  px=e.clientX;py=e.clientY;updateCam();
});
canvas.addEventListener('pointerup',e=>{
  dragging=false;
  if(!moved) pick(e.clientX,e.clientY);
});
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  radius *= (1 + Math.sign(e.deltaY)*.08);
  updateCam();
},{passive:false});
canvas.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    pinchD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
  }
},{passive:true});
canvas.addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    radius *= pinchD/d; pinchD=d; updateCam();
    dragging=false;
  }
},{passive:true});

const ray = new THREE.Raycaster(); const ptr = new THREE.Vector2();
function pick(x,y){
  ptr.x=(x/innerWidth)*2-1; ptr.y=-(y/innerHeight)*2+1;
  ray.setFromCamera(ptr,camera);
  const hit = ray.intersectObjects(clickable)[0];
  if(hit) openCard(hit.object.userData.planet);
}

/* --- modal --- */
const veil=document.getElementById('veil');
function openCard(p){
  document.getElementById('c-emoji').textContent=p.emoji||'';
  document.getElementById('c-title').textContent=p.title;
  document.getElementById('c-msg').textContent=p.msg;
  document.getElementById('c-date').textContent=p.date||'';
  const img=document.getElementById('c-img');
  if(p.img){img.src=p.img;img.style.display='block';}else img.style.display='none';
  veil.classList.add('open');
}
document.getElementById('c-close').onclick=()=>veil.classList.remove('open');
veil.addEventListener('click',e=>{if(e.target===veil)veil.classList.remove('open')});
addEventListener('keydown',e=>{if(e.key==='Escape')veil.classList.remove('open')});

/* --- intro --- */
let started=false;
document.getElementById('explore').onclick=()=>{
  document.getElementById('intro').classList.add('hidden');
  started=true;
  const h=document.getElementById('hint');h.classList.add('show');
  setTimeout(()=>h.classList.remove('show'),7000);
};

/* --- loop --- */
let introZoom = 260; radius = introZoom;
(function animate(t){
  requestAnimationFrame(animate);
  const s = t/1000;

  /* flotación de planetas */
  planetGroup.children.forEach((g,i)=>{
    g.position.y = g.userData.base + Math.sin(s*g.userData.speed + g.userData.phase)*2.2;
    g.userData.mesh.rotation.y = s*.15 + i;
    if(g.userData.ring) g.userData.ring.rotation.z = s*.3;
  });

  /* corazones suben lento */
  hearts.forEach(h=>{
    h.position.y += h.userData.v;
    if(h.position.y>90)h.position.y=-90;
  });

  /* rotación ambiente + inercia */
  if(!dragging){
    theta += .0006 + vTheta; phi += vPhi;
    vTheta*=.95; vPhi*=.95;
  }
  /* zoom de entrada */
  if(started && radius>120){ radius += (118-radius)*.03; }
  updateCam();

  stars2.rotation.y = s*.005;
  stars3.rotation.y = -s*.003;

  renderer.render(scene,camera);
})(0);
</script>
</body>
</html>
